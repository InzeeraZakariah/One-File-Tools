<!--
Word / Character Counter
Single-file client-side tool for real-time word, character, and sentence
counting. Minimal, no dependencies.
Built for One File Tools.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word / Character Counter - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #4ade80;
        --accent-hover: #22c55e;
        --accent-glow: rgba(74, 222, 128, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 20px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 100%;
        max-width: 780px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 540px;
        margin: 0 auto;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: block;
        margin-bottom: 14px;
      }

      textarea {
        width: 100%;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 15px;
        padding: 14px;
        resize: vertical;
        min-height: 220px;
        line-height: 1.6;
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 18px;
      }

      .stat-card {
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        text-align: center;
      }

      .stat-card .stat-value {
        font-family: var(--font-display);
        font-size: 32px;
        font-weight: 700;
        color: var(--accent);
        line-height: 1.2;
      }

      .stat-card .stat-label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 4px;
      }

      .extra-stats {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-muted);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .btn-ghost {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 16px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-ghost:hover {
        background: rgba(55, 65, 81, 0.8);
      }

      .btn-ghost:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .footer-note {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
      }

      .footer-note a {
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 22px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 640px) {
        .studio {
          padding: 18px;
        }
        .stats-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Text & Content</div>
        <h1 class="wordmark">Word / Character Counter</h1>
        <p class="tagline">Type or paste text to instantly see word, character, and sentence counts — no ads, no bloat, just the numbers.</p>
      </header>

      <main class="studio">
        <label class="section-label" for="textInput">Your text</label>
        <textarea id="textInput" spellcheck="true" placeholder="Start typing or paste your text here…" autofocus></textarea>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="wordCount">0</div>
            <div class="stat-label">Words</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="charCount">0</div>
            <div class="stat-label">Characters</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="sentenceCount">0</div>
            <div class="stat-label">Sentences</div>
          </div>
        </div>

        <div class="extra-stats">
          <span id="charNoSpaces">0 characters (no spaces)</span>
          <span id="lineCount">0 lines</span>
          <span id="readingTime">~0 min read</span>
        </div>

        <div class="actions">
          <button class="btn-ghost" id="btnCopy" type="button">Copy text</button>
          <button class="btn-ghost" id="btnClear" type="button">Clear</button>
        </div>
      </main>

      <p class="footer-note">Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a>. Fully offline, zero dependencies.</p>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      /* ==========================================================
         Word / Character Counter
         Vanilla JS, no dependencies.
         ========================================================== */

      const textInput = document.getElementById("textInput");
      const wordCount = document.getElementById("wordCount");
      const charCount = document.getElementById("charCount");
      const sentenceCount = document.getElementById("sentenceCount");
      const charNoSpaces = document.getElementById("charNoSpaces");
      const lineCount = document.getElementById("lineCount");
      const readingTime = document.getElementById("readingTime");
      const btnCopy = document.getElementById("btnCopy");
      const btnClear = document.getElementById("btnClear");
      const toast = document.getElementById("toast");

      const AVERAGE_WORDS_PER_MINUTE = 200;

      /** Shows a brief toast. */
      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      /** Counts words by splitting on whitespace and ignoring empty tokens. */
      function countWords(text) {
        const trimmed = text.trim();
        if (!trimmed) return 0;
        return trimmed.split(/\s+/).length;
      }

      /**
       * Counts sentences by splitting on ., !, or ? followed by whitespace/end
       * of string. This is a simple heuristic — it doesn't special-case
       * abbreviations like "Mr." or decimal numbers, so results are
       * approximate for text with heavy abbreviation use.
       */
      function countSentences(text) {
        const trimmed = text.trim();
        if (!trimmed) return 0;
        const matches = trimmed.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g);
        if (!matches) return 0;
        return matches.filter((s) => s.trim().length > 0).length;
      }

      /** Recomputes and renders every stat from the current text. */
      function render() {
        const text = textInput.value;

        wordCount.textContent = countWords(text).toLocaleString();
        charCount.textContent = text.length.toLocaleString();
        sentenceCount.textContent = countSentences(text).toLocaleString();

        const withoutSpaces = text.replace(/\s/g, "");
        charNoSpaces.textContent = withoutSpaces.length.toLocaleString() + " characters (no spaces)";

        const lines = text === "" ? 0 : text.split(/\n/).length;
        lineCount.textContent = lines.toLocaleString() + " line" + (lines === 1 ? "" : "s");

        const minutes = Math.max(0, Math.ceil(countWords(text) / AVERAGE_WORDS_PER_MINUTE));
        readingTime.textContent = "~" + minutes + " min read";
      }

      textInput.addEventListener("input", render);

      btnCopy.addEventListener("click", () => {
        const text = textInput.value;
        if (!text) {
          showToast("Nothing to copy yet");
          return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(text)
            .then(() => showToast("Text copied!"))
            .catch(() => showToast("Copy failed — select the text manually"));
        } else {
          showToast("Clipboard unavailable");
        }
      });

      btnClear.addEventListener("click", () => {
        textInput.value = "";
        render();
        textInput.focus();
      });

      render();
    </script>
  </body>
</html>
