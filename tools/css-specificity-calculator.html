<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Specificity Calculator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --paper: #eeedeb;
        --tan: #e0ccbe;
        --olive: #747264;
        --umber: #3c3633;

        --bg: var(--paper);
        --surface: #ffffff;
        --surface-2: var(--tan);
        --border: #d9c9ba;
        --text: var(--umber);
        --muted: var(--olive);
        --accent: var(--umber);
        --accent-text: var(--paper);

        --tier-id: #a84b2a;
        --tier-id-bg: rgba(168, 75, 42, 0.12);
        --tier-cls: #8a6a17;
        --tier-cls-bg: rgba(138, 106, 23, 0.12);
        --tier-elem: #4c6b49;
        --tier-elem-bg: rgba(76, 107, 73, 0.12);
        --tier-imp: #9c2e22;
        --tier-imp-bg: rgba(156, 46, 34, 0.12);

        --font-display: "Playfair Display", serif;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --radius: 10px;
      }

      [data-theme="dark"] {
        --bg: #211d1a;
        --surface: #3c3633;
        --surface-2: #4a423c;
        --border: #5c5148;
        --text: #eeedeb;
        --muted: #c9beb2;
        --accent: #e0ccbe;
        --accent-text: #221e1b;

        --tier-id: #e8875c;
        --tier-id-bg: rgba(232, 135, 92, 0.18);
        --tier-cls: #e5c066;
        --tier-cls-bg: rgba(229, 192, 102, 0.18);
        --tier-elem: #90b48b;
        --tier-elem-bg: rgba(144, 180, 139, 0.18);
        --tier-imp: #e2695a;
        --tier-imp-bg: rgba(226, 105, 90, 0.2);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        min-height: 100vh;
        transition:
          background 0.2s,
          color 0.2s;
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 22px 28px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }

      .logo {
        color: var(--tier-id);
        flex-shrink: 0;
      }

      .brand {
        display: flex;
        flex-direction: column;
        margin-right: auto;
      }
      .brand .eyebrow {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .brand h1 {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .btn {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 7px 14px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .btn:hover {
        border-color: var(--olive);
      }
      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .segment {
        display: flex;
        border: 1px solid var(--border);
        border-radius: 100px;
        overflow: hidden;
        background: var(--surface);
      }
      .segment button {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        background: transparent;
        border: none;
        padding: 7px 14px;
        cursor: pointer;
      }
      .segment button.active {
        background: var(--accent);
        color: var(--accent-text);
      }

      .input-section {
        padding: 20px 28px;
        border-bottom: 1px solid var(--border);
      }
      .input-label {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        display: block;
        margin-bottom: 8px;
      }
      textarea {
        width: 100%;
        height: 160px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        resize: vertical;
        outline: none;
        font-family: var(--font-mono);
        font-size: 13.5px;
        line-height: 1.6;
        padding: 14px 16px;
      }
      textarea:focus {
        border-color: var(--accent);
      }
      textarea::placeholder {
        color: var(--muted);
        opacity: 0.7;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 28px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .stats {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-right: auto;
      }
      .pill {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
      }
      .pill.winner {
        color: var(--tier-id);
        border-color: var(--tier-id-bg);
        background: var(--tier-id-bg);
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .output {
        padding: 8px 28px 40px;
      }
      .empty {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }

      .results {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 14px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child {
        border-bottom: none;
      }
      .row:nth-child(odd) {
        background: color-mix(in srgb, var(--surface-2) 12%, var(--surface));
      }

      .rank {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--muted);
        width: 20px;
        flex-shrink: 0;
      }

      .selector {
        font-family: var(--font-mono);
        font-size: 13.5px;
        flex: 1 1 240px;
        min-width: 180px;
        word-break: break-word;
      }
      .tk-id {
        color: var(--tier-id);
        font-weight: 600;
      }
      .tk-cls {
        color: var(--tier-cls);
        font-weight: 600;
      }
      .tk-elem {
        color: var(--tier-elem);
      }
      .tk-mut {
        color: var(--muted);
      }

      .chips {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .chip {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 100px;
        white-space: nowrap;
      }
      .chip.id {
        color: var(--tier-id);
        background: var(--tier-id-bg);
      }
      .chip.cls {
        color: var(--tier-cls);
        background: var(--tier-cls-bg);
      }
      .chip.elem {
        color: var(--tier-elem);
        background: var(--tier-elem-bg);
      }
      .chip.imp {
        color: var(--tier-imp);
        background: var(--tier-imp-bg);
      }
      .chip.win {
        color: var(--accent-text);
        background: var(--umber);
      }
      [data-theme="dark"] .chip.win {
        background: var(--accent);
        color: var(--accent-text);
      }

      .tuple {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        header,
        .input-section,
        .toolbar,
        .output {
          padding-left: 16px;
          padding-right: 16px;
        }
        .row {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <svg class="logo" width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <path d="M8 3C5.5 3 5 4.5 5 6.5V9c0 1-1 1.5-1 2s1 1 1 2v2.5C5 17.5 5.5 19 8 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        <path d="M14 3c2.5 0 3 1.5 3 3.5V9c0 1 1 1.5 1 2s-1 1-1 2v2.5c0 2-0.5 3.5-3 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      <div class="brand">
        <span class="eyebrow">CSS Tools</span>
        <h1>Specificity Calculator</h1>
      </div>
      <div class="segment" role="group" aria-label="Sort order">
        <button id="modeRanked" class="active" aria-pressed="true">Ranked</button>
        <button id="modeInput" aria-pressed="false">Input order</button>
      </div>
      <button class="btn" id="themeToggle">Dark mode</button>
    </header>

    <div class="input-section">
      <label class="input-label" for="selectorInput">Selectors or stylesheet</label>
      <textarea id="selectorInput" spellcheck="false" placeholder="Paste CSS selectors (one per line) or a full stylesheet…"></textarea>
    </div>

    <div class="toolbar">
      <div class="stats" id="stats" aria-live="polite"></div>
      <button class="btn" id="copyBtn">Copy results</button>
      <button class="btn" id="clearBtn">Clear</button>
    </div>

    <div class="output" id="output">
      <div class="empty">Paste selectors above to see their specificity breakdown.</div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const input = $("selectorInput"),
        output = $("output"),
        stats = $("stats");
      const modeRanked = $("modeRanked"),
        modeInput = $("modeInput");
      const copyBtn = $("copyBtn"),
        clearBtn = $("clearBtn"),
        themeToggle = $("themeToggle");

      let ranked = true;
      let lastDisplayRows = [];

      const escapeHtml = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      function splitTopLevel(str, delim) {
        const parts = [];
        let depth = 0,
          current = "";
        for (const ch of str) {
          if (ch === "(" || ch === "[") depth++;
          if (ch === ")" || ch === "]") depth--;
          if (ch === delim && depth === 0) {
            parts.push(current);
            current = "";
          } else current += ch;
        }
        parts.push(current);
        return parts;
      }

      function findMatchingParen(str, openIdx) {
        let depth = 0;
        for (let i = openIdx; i < str.length; i++) {
          if (str[i] === "(") depth++;
          else if (str[i] === ")") {
            depth--;
            if (depth === 0) return i;
          }
        }
        return -1;
      }

      function stripWhere(sel) {
        let result = "",
          i = 0;
        while (i < sel.length) {
          const idx = sel.indexOf(":where(", i);
          if (idx === -1) {
            result += sel.slice(i);
            break;
          }
          result += sel.slice(i, idx);
          const closeParen = findMatchingParen(sel, idx + 6);
          if (closeParen === -1) {
            result += sel.slice(idx);
            break;
          }
          i = closeParen + 1;
        }
        return result;
      }

      function compareTuples(a, b) {
        if (a.id !== b.id) return a.id - b.id;
        if (a.cls !== b.cls) return a.cls - b.cls;
        return a.elem - b.elem;
      }

      function countSimple(s) {
        const counts = { id: 0, cls: 0, elem: 0 };
        const tokenRegex = /(#[\w-]+)|(\.[\w-]+)|(\[[^\]]*\])|(::[\w-]+)|(:[\w-]+)|([a-zA-Z][\w-]*)|(\*)/g;
        let m;
        while ((m = tokenRegex.exec(s))) {
          if (m[1]) counts.id++;
          else if (m[2] || m[3] || m[5]) counts.cls++;
          else if (m[4] || m[6]) counts.elem++;
        }
        return counts;
      }

      function resolveFunctional(sel, counts) {
        const names = [":is(", ":not(", ":has(", ":matches("];
        let result = "",
          i = 0;
        while (i < sel.length) {
          let foundIdx = -1,
            nameLen = 0;
          for (const name of names) {
            const idx = sel.indexOf(name, i);
            if (idx !== -1 && (foundIdx === -1 || idx < foundIdx)) {
              foundIdx = idx;
              nameLen = name.length;
            }
          }
          if (foundIdx === -1) {
            result += sel.slice(i);
            break;
          }
          result += sel.slice(i, foundIdx);
          const closeParen = findMatchingParen(sel, foundIdx + nameLen - 1);
          if (closeParen === -1) {
            result += sel.slice(foundIdx);
            break;
          }
          const inner = sel.slice(foundIdx + nameLen, closeParen);
          const args = splitTopLevel(inner, ",")
            .map((a) => a.trim())
            .filter(Boolean);
          let best = { id: -1, cls: 0, elem: 0 };
          args.forEach((arg) => {
            const t = specTuple(arg);
            if (compareTuples(t, best) > 0) best = t;
          });
          if (best.id === -1) best = { id: 0, cls: 0, elem: 0 };
          counts.id += best.id;
          counts.cls += best.cls;
          counts.elem += best.elem;
          i = closeParen + 1;
        }
        return result;
      }

      function specTuple(selRaw) {
        let s = stripWhere(selRaw);
        const counts = { id: 0, cls: 0, elem: 0 };
        s = resolveFunctional(s, counts);
        const simple = countSimple(s);
        counts.id += simple.id;
        counts.cls += simple.cls;
        counts.elem += simple.elem;
        return counts;
      }

      function highlightSelector(raw) {
        const tokenRegex = /(#[\w-]+)|(\.[\w-]+)|(\[[^\]]*\])|(::[\w-]+)|(:[\w-]+)|([a-zA-Z][\w-]*)|(\*)|([>+~])|(\s+)/g;
        let html = "",
          lastIndex = 0,
          m;
        while ((m = tokenRegex.exec(raw))) {
          if (m.index > lastIndex) html += escapeHtml(raw.slice(lastIndex, m.index));
          const text = escapeHtml(m[0]);
          if (m[1]) html += `<span class="tk-id">${text}</span>`;
          else if (m[2] || m[3] || m[5]) html += `<span class="tk-cls">${text}</span>`;
          else if (m[4] || m[6]) html += `<span class="tk-elem">${text}</span>`;
          else html += `<span class="tk-mut">${text}</span>`;
          lastIndex = tokenRegex.lastIndex;
        }
        html += escapeHtml(raw.slice(lastIndex));
        return html;
      }

      function extractRules(text) {
        const clean = text.replace(/\/\*[\s\S]*?\*\//g, "");
        const rules = [];
        if (/\{/.test(clean)) {
          const regex = /([^{}]+)\{([^{}]*)\}/g;
          let m;
          while ((m = regex.exec(clean))) {
            const selectorPart = m[1].trim();
            if (!selectorPart || selectorPart.startsWith("@")) continue;
            const important = /!important/i.test(m[2]);
            splitTopLevel(selectorPart, ",").forEach((s) => {
              const trimmed = s.trim();
              if (trimmed) rules.push({ raw: trimmed, important });
            });
          }
        } else {
          clean.split("\n").forEach((line) => {
            const important = /!important/i.test(line);
            const cleaned = line
              .replace(/!important/gi, "")
              .replace(/;\s*$/, "")
              .trim();
            if (!cleaned) return;
            splitTopLevel(cleaned, ",").forEach((s) => {
              const trimmed = s.trim();
              if (trimmed) rules.push({ raw: trimmed, important });
            });
          });
        }
        return rules;
      }

      function computeRows(text) {
        return extractRules(text).map((r) => {
          const t = specTuple(r.raw);
          return { raw: r.raw, important: r.important, id: t.id, cls: t.cls, elem: t.elem };
        });
      }

      function renderStats(rows) {
        const pills = [`<span class="pill">${rows.length} selector${rows.length === 1 ? "" : "s"}</span>`];
        if (rows.length > 1) {
          const winner = rows.reduce((a, b) => (compareTuples(b, a) > 0 ? b : a));
          pills.push(`<span class="pill winner">Top: ${escapeHtml(winner.raw)}</span>`);
        }
        stats.innerHTML = pills.join("");
      }

      function renderTable(rows) {
        const display = ranked ? [...rows].sort((a, b) => compareTuples(b, a)) : rows;
        lastDisplayRows = display;
        const html = display
          .map((row, i) => {
            const win = ranked && i === 0 && rows.length > 1 ? `<span class="chip win">Wins</span>` : "";
            const imp = row.important ? `<span class="chip imp">!important</span>` : "";
            return `<div class="row">
            <span class="rank">${i + 1}</span>
            <code class="selector">${highlightSelector(row.raw)}</code>
            <div class="chips">
              <span class="chip id">ID ${row.id}</span>
              <span class="chip cls">CLS ${row.cls}</span>
              <span class="chip elem">ELEM ${row.elem}</span>
              ${imp}${win}
              <span class="tuple">(${row.id}, ${row.cls}, ${row.elem})</span>
            </div>
          </div>`;
          })
          .join("");
        output.innerHTML = `<div class="results">${html}</div>`;
      }

      function render() {
        const text = input.value;
        if (!text.trim()) {
          output.innerHTML = '<div class="empty">Paste selectors above to see their specificity breakdown.</div>';
          stats.innerHTML = "";
          lastDisplayRows = [];
          return;
        }
        const rows = computeRows(text);
        if (!rows.length) {
          output.innerHTML = '<div class="empty">No valid selectors found.</div>';
          stats.innerHTML = "";
          lastDisplayRows = [];
          return;
        }
        renderStats(rows);
        renderTable(rows);
      }

      let timer;
      input.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(render, 200);
      });

      modeRanked.addEventListener("click", () => {
        ranked = true;
        modeRanked.classList.add("active");
        modeRanked.setAttribute("aria-pressed", "true");
        modeInput.classList.remove("active");
        modeInput.setAttribute("aria-pressed", "false");
        render();
      });
      modeInput.addEventListener("click", () => {
        ranked = false;
        modeInput.classList.add("active");
        modeInput.setAttribute("aria-pressed", "true");
        modeRanked.classList.remove("active");
        modeRanked.setAttribute("aria-pressed", "false");
        render();
      });

      clearBtn.addEventListener("click", () => {
        input.value = "";
        render();
        input.focus();
      });

      copyBtn.addEventListener("click", async () => {
        if (!lastDisplayRows.length) return;
        const lines = lastDisplayRows.map((r, i) => `${i + 1}. ${r.raw} -> (${r.id}, ${r.cls}, ${r.elem})${r.important ? " !important" : ""}`);
        await navigator.clipboard.writeText(lines.join("\n"));
        const original = copyBtn.textContent;
        copyBtn.textContent = "Copied!";
        setTimeout(() => (copyBtn.textContent = original), 1500);
      });

      themeToggle.addEventListener("click", () => {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        setTheme(isDark ? "light" : "dark");
      });

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        themeToggle.textContent = theme === "dark" ? "Light mode" : "Dark mode";
        localStorage.setItem("cssc-theme", theme);
      }

      const savedTheme = localStorage.getItem("cssc-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(savedTheme || (prefersDark ? "dark" : "light"));

      input.value = ".nav .link\n.nav a.link.active\n#main-nav .link\na\n.card > .header:hover::before";
      render();
    </script>
  </body>
</html>
