<!--
Viewport / Screen Info
Single-file client-side tool that displays live browser, screen, and
viewport information using standard browser APIs.
Built for One File Tools.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewport / Screen Info - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #22d3ee;
        --accent-hover: #06b6d4;
        --accent-glow: rgba(34, 211, 238, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 20px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 100%;
        max-width: 900px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 580px;
        margin: 0 auto;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: block;
        margin-bottom: 14px;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .info-card {
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
      }

      .info-card .label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      .info-card .value {
        font-family: var(--font-mono);
        font-size: 15px;
        color: var(--text);
        word-break: break-word;
      }

      .full-row {
        grid-column: 1 / -1;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .btn-ghost {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 16px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-ghost:hover {
        background: rgba(55, 65, 81, 0.8);
      }

      .btn-ghost:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .footer-note {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
      }

      .footer-note a {
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 22px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 640px) {
        .studio {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Browser & Network</div>
        <h1 class="wordmark">Viewport / Screen Info</h1>
        <p class="tagline">Live browser, screen, and viewport details — resize the window or rotate your device to watch the numbers update.</p>
      </header>

      <main class="studio">
        <span class="section-label">Viewport</span>
        <div class="info-grid" id="viewportGrid"></div>
      </main>

      <main class="studio">
        <span class="section-label">Screen</span>
        <div class="info-grid" id="screenGrid"></div>
      </main>

      <main class="studio">
        <span class="section-label">Browser & page</span>
        <div class="info-grid" id="browserGrid"></div>
      </main>

      <main class="studio">
        <div class="actions">
          <button class="btn-ghost" id="btnCopyAll" type="button">Copy all info</button>
        </div>
      </main>

      <p class="footer-note">Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a>. Runs entirely offline — no data leaves your browser.</p>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      /* ==========================================================
         Viewport / Screen Info
         Vanilla JS, no dependencies. Live updates on resize,
         orientation change, and devicePixelRatio change.
         ========================================================== */

      const viewportGrid = document.getElementById("viewportGrid");
      const screenGrid = document.getElementById("screenGrid");
      const browserGrid = document.getElementById("browserGrid");
      const btnCopyAll = document.getElementById("btnCopyAll");
      const toast = document.getElementById("toast");

      // Keeps the last rendered data so "Copy all" doesn't need to recompute.
      let lastSnapshot = {};

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      /** Renders a set of { label, value } cards into a grid container. */
      function renderCards(container, cards) {
        container.innerHTML = "";
        cards.forEach((card) => {
          const div = document.createElement("div");
          div.className = "info-card" + (card.full ? " full-row" : "");
          const label = document.createElement("div");
          label.className = "label";
          label.textContent = card.label;
          const value = document.createElement("div");
          value.className = "value";
          value.textContent = card.value;
          div.appendChild(label);
          div.appendChild(value);
          container.appendChild(div);
        });
      }

      /** Gathers and renders all viewport/screen/browser info. */
      function render() {
        const orientation = window.screen.orientation ? window.screen.orientation.type : window.innerWidth >= window.innerHeight ? "landscape (inferred)" : "portrait (inferred)";
        const touchSupport = "ontouchstart" in window || navigator.maxTouchPoints > 0;

        const viewportCards = [
          { label: "Viewport width", value: window.innerWidth + "px" },
          { label: "Viewport height", value: window.innerHeight + "px" },
          { label: "Visual viewport width", value: window.visualViewport ? Math.round(window.visualViewport.width) + "px" : "unsupported" },
          { label: "Visual viewport height", value: window.visualViewport ? Math.round(window.visualViewport.height) + "px" : "unsupported" },
          { label: "Outer window size", value: window.outerWidth + " × " + window.outerHeight },
          { label: "Device pixel ratio", value: window.devicePixelRatio.toString() }
        ];

        const screenCards = [
          { label: "Screen resolution", value: window.screen.width + " × " + window.screen.height },
          { label: "Available screen size", value: window.screen.availWidth + " × " + window.screen.availHeight },
          { label: "Orientation", value: orientation },
          { label: "Color depth", value: window.screen.colorDepth + "-bit" },
          { label: "Pixel depth", value: window.screen.pixelDepth + "-bit" },
          { label: "Touch support", value: touchSupport ? "Yes (" + navigator.maxTouchPoints + " max points)" : "No" }
        ];

        const browserCards = [
          { label: "Current URL", value: window.location.href, full: true },
          { label: "Protocol", value: window.location.protocol },
          { label: "Hostname", value: window.location.hostname },
          { label: "Language", value: navigator.language },
          { label: "Platform", value: navigator.platform || "unavailable" },
          { label: "Online status", value: navigator.onLine ? "Online" : "Offline" },
          { label: "User agent", value: navigator.userAgent, full: true }
        ];

        renderCards(viewportGrid, viewportCards);
        renderCards(screenGrid, screenCards);
        renderCards(browserGrid, browserCards);

        lastSnapshot = { viewport: viewportCards, screen: screenCards, browser: browserCards };
      }

      btnCopyAll.addEventListener("click", () => {
        const lines = [];
        ["viewport", "screen", "browser"].forEach((group) => {
          lines.push("== " + group.toUpperCase() + " ==");
          lastSnapshot[group].forEach((card) => lines.push(card.label + ": " + card.value));
          lines.push("");
        });
        const text = lines.join("\n").trim();

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(text)
            .then(() => showToast("Copied all info!"))
            .catch(() => showToast("Copy failed"));
        } else {
          showToast("Clipboard unavailable");
        }
      });

      // Live updates: resize covers most viewport/window changes; orientation
      // change and devicePixelRatio changes (e.g. moving between displays)
      // are covered separately since they don't always fire a resize event.
      window.addEventListener("resize", render);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", render);
      }
      if (window.screen.orientation) {
        window.screen.orientation.addEventListener("change", render);
      }
      window.addEventListener("online", render);
      window.addEventListener("offline", render);

      render();
    </script>
  </body>
</html>
